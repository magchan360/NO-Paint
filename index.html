<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO-Paint : Canvas No Paint Tool</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            overflow: hidden;
        }
        .canvas-container {
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- ヘッダー / ツールバー -->
    <header class="bg-white border-b p-3 md:p-4 flex flex-wrap items-center gap-3 md:gap-4 shadow-sm z-10">
        <div class="flex items-center space-x-2">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">NO-Paint</h1>
        </div>
        
        <div class="h-6 w-px bg-gray-300 hidden lg:block"></div>

        <!-- キャンバスサイズ設定 -->
        <div class="flex items-center space-x-2 bg-gray-100 p-1 rounded-lg border border-gray-200">
            <span class="text-[10px] font-bold text-gray-400 px-1 uppercase hidden sm:inline">Size</span>
            
            <select id="size-preset" class="bg-white border border-gray-300 rounded text-sm px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer text-gray-700">
                <option value="custom">カスタム</option>
                <option value="1200x675">Twitter (16:9)</option>
                <option value="1500x500">Twitter Header</option>
                <option value="1080x1080">正方形 (1:1)</option>
                <option value="1280x720">HD (720p)</option>
                <option value="1920x1080">Full HD (1080p)</option>
                <option value="800x600" selected>Default (4:3)</option>
            </select>

            <div class="flex items-center space-x-1 bg-white border border-gray-300 rounded px-1">
                <input type="number" id="canvas-width" value="800" class="w-14 px-1 py-1 text-xs text-center focus:outline-none bg-transparent" title="Width">
                <!-- 縦横入れ替えボタン -->
                <button id="swap-size" class="p-1 hover:bg-gray-100 rounded text-gray-400 hover:text-blue-600 transition" title="縦横を入れ替え">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
                </button>
                <input type="number" id="canvas-height" value="600" class="w-14 px-1 py-1 text-xs text-center focus:outline-none bg-transparent" title="Height">
            </div>
        </div>

        <div class="h-6 w-px bg-gray-300 hidden md:block"></div>

        <!-- 操作パネル -->
        <div class="flex items-center space-x-2">
            <button id="undo-btn" class="px-3 py-2 border border-gray-300 text-sm rounded-md hover:bg-gray-50 font-medium text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1" title="Ctrl+Z">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                <span class="hidden sm:inline">戻す</span>
            </button>
            <div class="h-6 w-px bg-gray-200"></div>
            <button id="add-text" class="px-3 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 transition font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                <span class="hidden sm:inline">テキスト</span>
            </button>
            <button id="crop-start" class="px-3 py-2 bg-orange-500 text-white text-sm rounded-md hover:bg-orange-600 transition font-medium hidden">
                トリミング
            </button>
            <button id="crop-confirm" class="px-3 py-2 bg-green-600 text-white text-sm rounded-md hover:bg-green-700 transition font-medium hidden">
                確定
            </button>
            <button id="delete-obj" class="px-3 py-2 bg-red-500 text-white text-sm rounded-md hover:bg-red-600 transition font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                <span class="hidden sm:inline">削除</span>
            </button>
        </div>

        <div class="flex-1"></div>

        <!-- 書き出し -->
        <button id="download-btn" class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-md hover:bg-emerald-700 transition font-medium flex items-center gap-2 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>保存</span>
        </button>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 overflow-auto p-4 md:p-8 flex justify-center items-start bg-gray-200">
        <div class="bg-white p-1 rounded-sm shadow-2xl transition-all duration-300">
            <canvas id="paint-canvas"></canvas>
        </div>
    </main>

    <script>
        const canvasWidthInput = document.getElementById('canvas-width');
        const canvasHeightInput = document.getElementById('canvas-height');
        const sizePreset = document.getElementById('size-preset');
        const swapSizeBtn = document.getElementById('swap-size');
        const cropStartBtn = document.getElementById('crop-start');
        const cropConfirmBtn = document.getElementById('crop-confirm');
        const undoBtn = document.getElementById('undo-btn');
        
        let croppingImage = null;
        let cropRect = null;

        // アンドゥ用履歴
        let history = [];
        const maxHistory = 50;
        let isProcessingUndo = false;

        // Fabric.jsの初期化
        const canvas = new fabric.Canvas('paint-canvas', {
            width: parseInt(canvasWidthInput.value),
            height: parseInt(canvasHeightInput.value),
            backgroundColor: '#ffffff'
        });

        // --- 履歴保存機能 ---
        function saveHistory() {
            if (isProcessingUndo) return;
            
            const json = canvas.toJSON();
            history.push(JSON.stringify(json));
            
            if (history.length > maxHistory) {
                history.shift();
            }
            updateUndoButtonState();
        }

        function undo() {
            if (history.length <= 1) return;
            
            isProcessingUndo = true;
            history.pop(); // 現在の状態を捨てる
            const prevState = history[history.length - 1];
            
            canvas.loadFromJSON(prevState, () => {
                canvas.renderAll();
                isProcessingUndo = false;
                updateUndoButtonState();
            });
        }

        function updateUndoButtonState() {
            undoBtn.disabled = history.length <= 1;
        }

        // キャンバスの変化を監視して履歴保存
        canvas.on('object:added', saveHistory);
        canvas.on('object:modified', saveHistory);
        canvas.on('object:removed', saveHistory);

        // --- SHIFTキーによる回転スナップ機能 ---
        canvas.on('object:rotating', (options) => {
            if (options.e && options.e.shiftKey) {
                options.target.snapAngle = 15;
            } else {
                options.target.snapAngle = 0;
            }
        });

        // 初期の状態を保存
        saveHistory();

        // --- 選択状態の監視 ---
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => {
            cropStartBtn.classList.add('hidden');
        });

        function handleSelection(e) {
            const selected = e.selected[0];
            if (selected && selected.type === 'image' && !croppingImage) {
                cropStartBtn.classList.remove('hidden');
            } else {
                cropStartBtn.classList.add('hidden');
            }
        }

        // --- キャンバスサイズ変更機能 ---
        function updateCanvasSize() {
            const width = parseInt(canvasWidthInput.value) || 100;
            const height = parseInt(canvasHeightInput.value) || 100;
            
            canvas.setDimensions({ width, height });
            canvas.renderAll();
            saveHistory();
        }

        // プリセット変更時の処理
        sizePreset.addEventListener('change', () => {
            const val = sizePreset.value;
            if (val !== 'custom') {
                const [w, h] = val.split('x').map(Number);
                canvasWidthInput.value = w;
                canvasHeightInput.value = h;
                updateCanvasSize();
            }
        });

        // 直接数値入力された時の処理
        const handleManualSizeChange = () => {
            sizePreset.value = 'custom';
            updateCanvasSize();
        };

        canvasWidthInput.addEventListener('change', handleManualSizeChange);
        canvasHeightInput.addEventListener('change', handleManualSizeChange);

        // 縦横入れ替えボタンの処理
        swapSizeBtn.addEventListener('click', () => {
            const currentW = canvasWidthInput.value;
            const currentH = canvasHeightInput.value;
            canvasWidthInput.value = currentH;
            canvasHeightInput.value = currentW;
            handleManualSizeChange();
        });

        // --- アンドゥ実行 ---
        undoBtn.addEventListener('click', undo);

        // --- テキスト追加機能 ---
        document.getElementById('add-text').addEventListener('click', () => {
            const text = new fabric.IText('ここをクリックして編集', {
                left: canvas.width / 2 - 100,
                top: canvas.height / 2 - 20,
                fontFamily: 'sans-serif',
                fontSize: 28,
                fill: '#333333'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        });

        // --- 画像ペースト機能 ---
        window.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    
                    reader.onload = function(event) {
                        fabric.Image.fromURL(event.target.result, (img) => {
                            if (img.width > canvas.width * 0.9) {
                                img.scaleToWidth(canvas.width * 0.8);
                            }
                            img.set({
                                left: canvas.width / 2 - (img.getScaledWidth() / 2),
                                top: canvas.height / 2 - (img.getScaledHeight() / 2),
                                cornerColor: '#3b82f6',
                                cornerStrokeColor: '#1d4ed8',
                                cornerSize: 10,
                                transparentCorners: false
                            });
                            canvas.add(img);
                            canvas.setActiveObject(img);
                        });
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        // --- トリミング機能 ---
        cropStartBtn.addEventListener('click', () => {
            const obj = canvas.getActiveObject();
            if (!obj || obj.type !== 'image') return;

            croppingImage = obj;
            canvas.getObjects().forEach(o => o.selectable = false);
            
            cropRect = new fabric.Rect({
                left: obj.left,
                top: obj.top,
                width: obj.getScaledWidth() / 2,
                height: obj.getScaledHeight() / 2,
                fill: 'rgba(0,0,0,0.3)',
                stroke: '#fb923c',
                strokeDashArray: [5, 5],
                strokeWidth: 2,
                cornerColor: '#fb923c',
                hasRotatingPoint: false,
                transparentCorners: false
            });

            canvas.add(cropRect);
            canvas.setActiveObject(cropRect);
            
            cropStartBtn.classList.add('hidden');
            cropConfirmBtn.classList.remove('hidden');
        });

        cropConfirmBtn.addEventListener('click', () => {
            if (!croppingImage || !cropRect) return;

            const left = (cropRect.left - croppingImage.left) / croppingImage.scaleX;
            const top = (cropRect.top - croppingImage.top) / croppingImage.scaleY;
            const width = cropRect.getScaledWidth() / croppingImage.scaleX;
            const height = cropRect.getScaledHeight() / croppingImage.scaleY;

            croppingImage.set({
                clipPath: new fabric.Rect({
                    left: left - (croppingImage.width / 2),
                    top: top - (croppingImage.height / 2),
                    width: width,
                    height: height
                })
            });

            croppingImage.cloneAsImage((cloned) => {
                canvas.remove(croppingImage);
                canvas.add(cloned);
                canvas.setActiveObject(cloned);
                cleanupCrop();
            });
        });

        function cleanupCrop() {
            canvas.remove(cropRect);
            canvas.getObjects().forEach(o => o.selectable = true);
            cropRect = null;
            croppingImage = null;
            cropConfirmBtn.classList.add('hidden');
            canvas.renderAll();
        }

        // --- 削除機能 ---
        const deleteActiveObjects = () => {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach((obj) => {
                    canvas.remove(obj);
                });
                canvas.requestRenderAll();
            }
        };

        document.getElementById('delete-obj').addEventListener('click', deleteActiveObjects);

        // --- PNG保存機能 ---
        document.getElementById('download-btn').addEventListener('click', () => {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = `no-paint-${new Date().getTime()}.png`;
            link.href = dataURL;
            link.click();
        });

        // キーボード操作
        window.addEventListener('keydown', (e) => {
            // アンドゥ (Ctrl+Z / Cmd+Z)
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                undo();
                return;
            }

            // 削除
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObject = canvas.getActiveObject();
                if (activeObject && activeObject.isEditing) return;
                deleteActiveObjects();
            }
        });

        canvas.renderAll();
    </script>
</body>
</html>
