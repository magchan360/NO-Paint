<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NO-Paint : Canvas Annotation Tool</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            overflow: hidden;
        }
        .canvas-container {
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }
        .align-btn.active, .toggle-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header Toolbar -->
    <header class="bg-white border-b p-3 md:p-4 flex flex-wrap items-center gap-3 md:gap-4 shadow-sm z-10">
        <div class="flex items-center space-x-2">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">NO-Paint</h1>
        </div>
        
        <div class="h-6 w-px bg-gray-300 hidden lg:block"></div>

        <!-- Canvas Size Settings -->
        <div class="flex items-center space-x-2 bg-gray-100 p-1 rounded-lg border border-gray-200">
            <span class="text-[10px] font-bold text-gray-400 px-1 uppercase hidden sm:inline">Size</span>
            <select id="size-preset" class="bg-white border border-gray-300 rounded text-sm px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer text-gray-700">
                <option value="custom">カスタム</option>
                <option value="1200x675">Twitter (16:9)</option>
                <option value="1500x500">Twitter Header</option>
                <option value="1080x1080">正方形 (1:1)</option>
                <option value="1280x720">HD (720p)</option>
                <option value="1920x1080">Full HD (1080p)</option>
                <option value="800x600" selected>Default (4:3)</option>
            </select>
            <div class="flex items-center space-x-1 bg-white border border-gray-300 rounded px-1">
                <input type="number" id="canvas-width" value="800" class="w-14 px-1 py-1 text-xs text-center focus:outline-none bg-transparent">
                <button id="swap-size" class="p-1 hover:bg-gray-100 rounded text-gray-400 transition"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg></button>
                <input type="number" id="canvas-height" value="600" class="w-14 px-1 py-1 text-xs text-center focus:outline-none bg-transparent">
            </div>
        </div>

        <!-- Tool Panel -->
        <div class="flex items-center space-x-2">
            <!-- 「戻す」ボタン（title属性を追加、文字のspanを削除） -->
            <button id="undo-btn" title="戻す" class="px-3 py-2 border border-gray-300 text-sm rounded-md hover:bg-gray-50 font-medium text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
            </button>
            
            <!-- 「テキスト」ボタン（title属性を追加、文字のspanを削除） -->
            <button id="add-text" title="テキスト" class="px-3 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 transition font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            </button>
        
            <div class="flex bg-gray-100 p-1 rounded-md border border-gray-200">
                <button id="add-highlight-circle" class="p-2 hover:bg-red-200 text-red-600 rounded transition" title="円"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/></svg></button>
                <button id="add-highlight-rect" class="p-2 hover:bg-red-200 text-red-600 rounded transition" title="四角"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></button>
                <button id="add-highlight-arrow" class="p-2 hover:bg-red-200 text-red-600 rounded transition" title="矢印"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 3L9 15"/><path d="M11 21L3 21L3 13L11 21Z" fill="currentColor"/></svg></button>
                <div class="w-px bg-gray-300 mx-1"></div>
                <button id="add-highlight-star" class="p-2 hover:bg-yellow-100 text-yellow-600 rounded transition" title="星"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
                <button id="add-highlight-heart" class="p-2 hover:bg-pink-100 text-pink-600 rounded transition" title="ハート"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></button>
            </div>

            <!-- Property Panel -->
            <div id="prop-controls" class="hidden flex items-center space-x-3 bg-gray-50 border border-gray-200 rounded-md px-3 py-1 shadow-sm">
                <div class="flex items-center space-x-1">
                    <span id="prop-label" class="text-[10px] font-bold text-gray-500 uppercase">Size</span>
                    <input type="range" id="prop-slider" min="1" max="50" value="5" class="w-20 h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <span id="prop-value" class="text-xs font-mono w-4 text-gray-600">5</span>
                </div>
                <div class="h-4 w-px bg-gray-300"></div>
                <div class="flex items-center space-x-1">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Opacity</span>
                    <input type="range" id="prop-opacity" min="0" max="100" value="100" class="w-16 h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    <span id="prop-opacity-value" class="text-xs font-mono w-6 text-gray-600">100</span>
                </div>
                <div class="h-4 w-px bg-gray-300"></div>
                <div class="flex items-center space-x-1">
                    <input type="color" id="prop-color" value="#ff0000" class="w-6 h-6 p-0 border-none rounded cursor-pointer bg-transparent">
                </div>
                <div id="text-specific-controls" class="hidden flex items-center space-x-3 border-l border-gray-300 pl-3">
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] font-bold text-gray-500 uppercase">Outline</span>
                        <div class="flex bg-white border border-gray-200 rounded-md overflow-hidden">
                            <button id="toggle-stroke" class="px-2 py-1 text-[10px] font-bold hover:bg-gray-100 border-r border-gray-200 transition">縁取り</button>
                            <input type="color" id="prop-stroke-color" value="#000000" class="w-6 h-6 p-0 border-none cursor-pointer bg-transparent">
                        </div>
                    </div>
                    <div class="h-4 w-px bg-gray-300"></div>
                    <div class="flex items-center space-x-2">
                        <span class="text-[10px] font-bold text-gray-500 uppercase">BG</span>
                        <input type="color" id="prop-bg-color" value="#ffffff" class="w-6 h-6 p-0 border-none rounded cursor-pointer bg-transparent">
                        <input type="range" id="prop-bg-opacity" min="0" max="100" value="100" class="w-16 h-1.5 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        <span id="prop-bg-opacity-value" class="text-xs font-mono w-6 text-gray-600">100</span>
                        <button id="clear-bg-color" class="p-1 hover:bg-gray-200 rounded text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <div class="h-4 w-px bg-gray-300"></div>
                    <div class="flex items-center bg-white border border-gray-200 rounded-md p-1">
                        <button id="align-left" class="align-btn p-1 hover:bg-gray-100 rounded text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="6" x2="3" y2="6"/><line x1="15" y1="12" x2="3" y2="12"/><line x1="17" y1="18" x2="3" y2="18"/></svg></button>
                        <button id="align-center" class="align-btn p-1 hover:bg-gray-100 rounded text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="12" x2="7" y2="12"/><line x1="19" y1="18" x2="5" y2="18"/></svg></button>
                        <button id="align-right" class="align-btn p-1 hover:bg-gray-100 rounded text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="12" x2="9" y2="12"/><line x1="21" y1="18" x2="7" y2="18"/></svg></button>
                    </div>
                </div>
            </div>
            
            <button id="send-to-back" class="px-3 py-2 bg-gray-600 text-white text-sm rounded-md hover:bg-gray-700 transition font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M12 8v8"/><path d="m9 13 3 3 3-3"/></svg>
                <span class="hidden sm:inline">最背面</span>
            </button>

            <button id="delete-obj" class="px-3 py-2 bg-red-500 text-white text-sm rounded-md hover:bg-red-600 transition font-medium flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                <span class="hidden sm:inline">削除</span>
            </button>
        </div>

        <div class="flex-1"></div>

        <button id="download-btn" class="px-4 py-2 bg-emerald-600 text-white text-sm rounded-md hover:bg-emerald-700 transition font-medium flex items-center gap-2 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>保存</span>
        </button>
    </header>

    <main class="flex-1 overflow-auto p-4 md:p-8 flex justify-center items-start bg-gray-200">
        <div class="bg-white p-1 rounded-sm shadow-2xl transition-all duration-300">
            <canvas id="paint-canvas"></canvas>
        </div>
    </main>

    <script>
        const canvasWidthInput = document.getElementById('canvas-width');
        const canvasHeightInput = document.getElementById('canvas-height');
        const sizePreset = document.getElementById('size-preset');
        const swapSizeBtn = document.getElementById('swap-size');
        const undoBtn = document.getElementById('undo-btn');
        const sendToBackBtn = document.getElementById('send-to-back');
        const addCircleBtn = document.getElementById('add-highlight-circle');
        const addRectBtn = document.getElementById('add-highlight-rect');
        const addArrowBtn = document.getElementById('add-highlight-arrow');
        const addStarBtn = document.getElementById('add-highlight-star');
        const addHeartBtn = document.getElementById('add-highlight-heart');
        
        const propControls = document.getElementById('prop-controls');
        const propSlider = document.getElementById('prop-slider');
        const propOpacity = document.getElementById('prop-opacity');
        const propOpacityValueText = document.getElementById('prop-opacity-value');
        const propColor = document.getElementById('prop-color');
        
        const textSpecificControls = document.getElementById('text-specific-controls');
        const toggleStrokeBtn = document.getElementById('toggle-stroke');
        const propStrokeColor = document.getElementById('prop-stroke-color');
        
        const propBgColor = document.getElementById('prop-bg-color');
        const propBgOpacity = document.getElementById('prop-bg-opacity');
        const propBgOpacityValueText = document.getElementById('prop-bg-opacity-value');
        const clearBgBtn = document.getElementById('clear-bg-color');
        
        const propLabel = document.getElementById('prop-label');
        const propValueText = document.getElementById('prop-value');
        const alignLeftBtn = document.getElementById('align-left');
        const alignCenterBtn = document.getElementById('align-center');
        const alignRightBtn = document.getElementById('align-right');
        
        let history = [];
        const maxHistory = 50;
        let isProcessingUndo = false;

        const canvas = new fabric.Canvas('paint-canvas', {
            width: parseInt(canvasWidthInput.value),
            height: parseInt(canvasHeightInput.value),
            backgroundColor: '#ffffff',
            preserveObjectStacking: true
        });

        // --- History ---
        function saveHistory() {
            if (isProcessingUndo) return;
            const json = canvas.toJSON(['isFilledShape', 'paintStrokeEnabled']);
            history.push(JSON.stringify(json));
            if (history.length > maxHistory) history.shift();
            updateUndoButtonState();
        }

        function undo() {
            if (history.length <= 1) return;
            isProcessingUndo = true;
            history.pop();
            const prevState = history[history.length - 1];
            canvas.loadFromJSON(prevState, () => {
                canvas.renderAll();
                isProcessingUndo = false;
                updateUndoButtonState();
            });
        }

        function updateUndoButtonState() {
            undoBtn.disabled = history.length <= 1;
        }

        canvas.on('object:added', saveHistory);
        canvas.on('object:modified', saveHistory);
        canvas.on('object:removed', saveHistory);

        // --- Helpers ---
        function hexToRgba(hex, opacity) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity})`;
        }

        function rgbaToData(rgba) {
            if (!rgba || !rgba.startsWith('rgba')) return { hex: '#ffffff', alpha: 1 };
            const parts = rgba.match(/[\d\.]+/g);
            const r = parseInt(parts[0]).toString(16).padStart(2, '0');
            const g = parseInt(parts[1]).toString(16).padStart(2, '0');
            const b = parseInt(parts[2]).toString(16).padStart(2, '0');
            return { hex: `#${r}${g}${b}`, alpha: parseFloat(parts[3]) };
        }

        // --- Correct Ctrl + Drag to Copy Logic ---
        let dragOriginalX = 0;
        let dragOriginalY = 0;

        canvas.on('mouse:down', (options) => {
            const target = options.target;
            // Ctrlキーが押されている場合のみ複製処理を行う
            if ((options.e.ctrlKey || options.e.metaKey) && target && target.selectable) {
                // 元のオブジェクトの位置を記録
                dragOriginalX = target.left;
                dragOriginalY = target.top;

                // 複製を作成
                target.clone((cloned) => {
                    // クローンしたものを「元の場所」に配置して追加
                    cloned.set({
                        left: dragOriginalX,
                        top: dragOriginalY
                    });
                    canvas.add(cloned);
                    // canvas.setActiveObject(target); // マウスで掴んでいる方は元のtargetのままにする
                    canvas.renderAll();
                }, ['isFilledShape', 'paintStrokeEnabled']);
            }
        });

        // --- Selection handling ---
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', () => {
            propControls.classList.add('hidden');
            textSpecificControls.classList.add('hidden');
        });

        function handleSelection(e) {
            const selected = e.selected ? e.selected[0] : canvas.getActiveObject();
            if (!selected) return;

            propControls.classList.remove('hidden');
            propOpacity.value = Math.round((selected.opacity || 1) * 100);
            propOpacityValueText.innerText = propOpacity.value;

            if (selected.type === 'i-text' || selected.type === 'textbox') {
                propLabel.innerText = 'Text';
                propSlider.min = 10; propSlider.max = 200; propSlider.step = 1;
                propSlider.value = selected.fontSize;
                propValueText.innerText = Math.round(selected.fontSize);
                propColor.value = selected.fill;
                textSpecificControls.classList.remove('hidden');
                const isStrokeOn = !!selected.paintStrokeEnabled;
                toggleStrokeBtn.classList.toggle('active', isStrokeOn);
                propStrokeColor.value = selected.stroke || '#000000';
                if (selected.backgroundColor) {
                    const data = rgbaToData(selected.backgroundColor);
                    propBgColor.value = data.hex;
                    propBgOpacity.value = Math.round(data.alpha * 100);
                    propBgOpacityValueText.innerText = propBgOpacity.value;
                } else {
                    propBgOpacity.value = 100;
                    propBgOpacityValueText.innerText = '100';
                }
                updateAlignButtons(selected.textAlign);
            } else {
                textSpecificControls.classList.add('hidden');
                if (selected.isFilledShape) {
                    propLabel.innerText = 'Size';
                    propSlider.min = 0.1; propSlider.max = 5; propSlider.step = 0.1;
                    propSlider.value = selected.scaleX;
                    propValueText.innerText = selected.scaleX.toFixed(1);
                    propColor.value = selected.fill;
                } else {
                    propLabel.innerText = 'Line';
                    propSlider.min = 1; propSlider.max = 50; propSlider.step = 1;
                    propSlider.value = selected.strokeWidth;
                    propValueText.innerText = Math.round(selected.strokeWidth);
                    propColor.value = selected.stroke;
                }
            }
        }

        // --- Property Control Listeners ---
        propSlider.addEventListener('input', () => {
            const activeObj = canvas.getActiveObject();
            if (!activeObj) return;
            const val = parseFloat(propSlider.value);
            propValueText.innerText = activeObj.isFilledShape ? val.toFixed(1) : Math.round(val);
            if (activeObj.type === 'i-text' || activeObj.type === 'textbox') activeObj.set('fontSize', val);
            else if (activeObj.isFilledShape) activeObj.scale(val);
            else activeObj.set('strokeWidth', val);
            canvas.renderAll();
        });
        propSlider.addEventListener('change', saveHistory);

        propOpacity.addEventListener('input', () => {
            const activeObj = canvas.getActiveObject();
            if (!activeObj) return;
            activeObj.set('opacity', propOpacity.value / 100);
            propOpacityValueText.innerText = propOpacity.value;
            canvas.renderAll();
        });
        propOpacity.addEventListener('change', saveHistory);

        propColor.addEventListener('input', () => {
            const activeObj = canvas.getActiveObject();
            if (!activeObj) return;
            if (activeObj.type === 'i-text' || activeObj.type === 'textbox' || activeObj.isFilledShape) activeObj.set('fill', propColor.value);
            else { activeObj.set('stroke', propColor.value); if (activeObj.type === 'path') activeObj.set('fill', propColor.value); }
            canvas.renderAll();
        });
        propColor.addEventListener('change', saveHistory);

        toggleStrokeBtn.addEventListener('click', () => {
            const activeObj = canvas.getActiveObject();
            if (!activeObj || !(activeObj.type === 'i-text' || activeObj.type === 'textbox')) return;
            const isCurrentlyOn = !!activeObj.paintStrokeEnabled;
            const newStatus = !isCurrentlyOn;
            activeObj.set({
                paintStrokeEnabled: newStatus,
                stroke: newStatus ? propStrokeColor.value : null,
                strokeWidth: newStatus ? 2 : 0,
                paintFirst: 'stroke',
                strokeLineJoin: 'round',
                strokeLineCap: 'round'
            });
            toggleStrokeBtn.classList.toggle('active', newStatus);
            canvas.renderAll();
            saveHistory();
        });

        propStrokeColor.addEventListener('input', () => {
            const activeObj = canvas.getActiveObject();
            if (!activeObj || !activeObj.paintStrokeEnabled) return;
            activeObj.set('stroke', propStrokeColor.value);
            canvas.renderAll();
        });
        propStrokeColor.addEventListener('change', saveHistory);

        const updateBgColor = () => {
            const activeObj = canvas.getActiveObject();
            if (!activeObj || !(activeObj.type === 'i-text' || activeObj.type === 'textbox')) return;
            const rgba = hexToRgba(propBgColor.value, propBgOpacity.value / 100);
            activeObj.set('backgroundColor', rgba);
            propBgOpacityValueText.innerText = propBgOpacity.value;
            canvas.renderAll();
        };
        propBgColor.addEventListener('input', updateBgColor);
        propBgColor.addEventListener('change', saveHistory);
        propBgOpacity.addEventListener('input', updateBgColor);
        propBgOpacity.addEventListener('change', saveHistory);

        clearBgBtn.addEventListener('click', () => {
            const activeObj = canvas.getActiveObject();
            if (activeObj) { activeObj.set('backgroundColor', ''); canvas.renderAll(); saveHistory(); }
        });

        function updateAlignButtons(textAlign) {
            [alignLeftBtn, alignCenterBtn, alignRightBtn].forEach(btn => btn.classList.remove('active'));
            if (textAlign === 'left') alignLeftBtn.classList.add('active');
            if (textAlign === 'center') alignCenterBtn.classList.add('active');
            if (textAlign === 'right') alignRightBtn.classList.add('active');
        }
        const setTextAlign = (align) => {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.set) { activeObj.set('textAlign', align); updateAlignButtons(align); canvas.renderAll(); saveHistory(); }
        };
        alignLeftBtn.addEventListener('click', () => setTextAlign('left'));
        alignCenterBtn.addEventListener('click', () => setTextAlign('center'));
        alignRightBtn.addEventListener('click', () => setTextAlign('right'));

        // --- Size Controls ---
        function updateCanvasSize() {
            canvas.setDimensions({ width: parseInt(canvasWidthInput.value), height: parseInt(canvasHeightInput.value) });
            saveHistory();
        }
        canvasWidthInput.addEventListener('change', updateCanvasSize);
        canvasHeightInput.addEventListener('change', updateCanvasSize);
        sizePreset.addEventListener('change', () => {
            if (sizePreset.value !== 'custom') {
                const [w, h] = sizePreset.value.split('x').map(Number);
                canvasWidthInput.value = w; canvasHeightInput.value = h; updateCanvasSize();
            }
        });
        swapSizeBtn.addEventListener('click', () => {
            [canvasWidthInput.value, canvasHeightInput.value] = [canvasHeightInput.value, canvasWidthInput.value];
            updateCanvasSize();
        });

        // --- Spawning ---
        document.getElementById('add-text').addEventListener('click', () => {
            const t = new fabric.Textbox('Text', { 
                left: 100, top: 100, width: 200, fontSize: 32, fill: propColor.value, 
                fontFamily: 'sans-serif', fontWeight: 'bold'
            });
            canvas.add(t).setActiveObject(t);
        });
        addCircleBtn.addEventListener('click', () => {
            canvas.add(new fabric.Circle({ radius: 40, left: 100, top: 100, fill: 'transparent', stroke: propColor.value, strokeWidth: 5, strokeUniform: true })).setActiveObject(canvas.getObjects().slice(-1)[0]);
        });
        addRectBtn.addEventListener('click', () => {
            canvas.add(new fabric.Rect({ width: 100, height: 80, left: 100, top: 100, fill: 'transparent', stroke: propColor.value, strokeWidth: 5, strokeUniform: true })).setActiveObject(canvas.getObjects().slice(-1)[0]);
        });
        addArrowBtn.addEventListener('click', () => {
            canvas.add(new fabric.Path('M 40 0 L 12 28 M 18 34 L 0 40 L 6 22 Z', { left: 100, top: 100, stroke: propColor.value, strokeWidth: 5, fill: propColor.value, strokeUniform: true })).setActiveObject(canvas.getObjects().slice(-1)[0]);
        });
        addStarBtn.addEventListener('click', () => {
            canvas.add(new fabric.Path('M 100 0 L 123 68 L 195 68 L 137 110 L 159 178 L 100 136 L 41 178 L 63 110 L 5 68 L 77 68 Z', { left: 100, top: 100, fill: propColor.value, scaleX: 0.4, scaleY: 0.4, isFilledShape: true })).setActiveObject(canvas.getObjects().slice(-1)[0]);
        });
        addHeartBtn.addEventListener('click', () => {
            canvas.add(new fabric.Path('M 10 30 A 20 20 0 0 1 50 30 A 20 20 0 0 1 90 30 Q 90 60 50 90 Q 10 60 10 30 z', { left: 100, top: 100, fill: propColor.value, scaleX: 0.8, scaleY: 0.8, isFilledShape: true })).setActiveObject(canvas.getObjects().slice(-1)[0]);
        });

        sendToBackBtn.addEventListener('click', () => {
            const active = canvas.getActiveObject();
            if (active) { canvas.sendToBack(active); canvas.discardActiveObject(); canvas.renderAll(); saveHistory(); }
        });

        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        fabric.Image.fromURL(f.target.result, (img) => {
                            if (img.width > canvas.width) img.scaleToWidth(canvas.width * 0.8);
                            canvas.add(img).setActiveObject(img);
                        });
                    };
                    reader.readAsDataURL(item.getAsFile());
                }
            }
        });

        document.getElementById('download-btn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `no-paint-${Date.now()}.png`;
            link.href = canvas.toDataURL({ format: 'png', quality: 1 });
            link.click();
        });

        const deleteActive = () => {
            const active = canvas.getActiveObjects();
            if (active.length) { canvas.discardActiveObject(); active.forEach(o => canvas.remove(o)); saveHistory(); }
        };
        document.getElementById('delete-obj').addEventListener('click', deleteActive);

        window.addEventListener('keydown', (e) => {
            const active = canvas.getActiveObject();
            if (active && active.isEditing) return;
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
            if (e.key === 'Delete' || e.key === 'Backspace') deleteActive();
        });

        undoBtn.addEventListener('click', undo);
        saveHistory();
        canvas.renderAll();
    </script>
</body>
</html>
